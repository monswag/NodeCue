name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test deps
        run: python -m pip install -r requirements-agent.txt

      - name: Smoke test add-on installer
        run: python scripts/install_addon.py --addons-dir /tmp/nodecue_addon_ci --force

      - name: Run unit tests
        run: python -m pytest tests -q
