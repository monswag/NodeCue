name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda (blender env)
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: blender
          auto-activate-base: false
          channels: conda-forge,defaults
          python-version: "3.11"

      - name: Install test deps
        shell: bash -el {0}
        run: |
          conda install -n blender -y pytest pyyaml
          conda run -n blender python -m pip install -r requirements-agent.txt

      - name: Run unit tests
        shell: bash -el {0}
        run: conda run -n blender python -m pytest tests -q
