name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-agent.txt"

      - name: Install test deps
        run: python -m pip install -r requirements-agent.txt

      - name: Smoke test add-on installer
        run: python scripts/install_addon.py --addons-dir /tmp/nodecue_addon_ci --force

      - name: Run unit tests
        run: python -m pytest tests -q

      - name: Build Blender add-on zip
        run: python scripts/build_release_bundle.py --output dist/nodecue-blender-addon.zip

      - name: Verify Blender add-on zip
        run: |
          python -m zipfile -l dist/nodecue-blender-addon.zip
          python -m zipfile -l dist/nodecue-blender-addon.zip | grep "nodecue/__init__.py"
          python -m zipfile -l dist/nodecue-blender-addon.zip | grep "nodecue/nodecue_agent/__init__.py"
          python -m zipfile -l dist/nodecue-blender-addon.zip | grep "nodecue/requirements-agent.txt"
          python -m zipfile -l dist/nodecue-blender-addon.zip | grep "nodecue/nodecue.env.example"
          ! python -m zipfile -l dist/nodecue-blender-addon.zip | grep "scripts/install_addon.py"
          ! python -m zipfile -l dist/nodecue-blender-addon.zip | grep -E "(__pycache__|\\.pyc$|\\.env$|\\.blend1?$|\\.tgz$)"

      - name: Upload Blender add-on zip
        uses: actions/upload-artifact@v4
        with:
          name: nodecue-blender-addon
          path: dist/nodecue-blender-addon.zip
