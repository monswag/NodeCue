name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test deps
        run: python -m pip install -r requirements-agent.txt

      - name: Smoke test add-on installer
        run: python scripts/install_addon.py --addons-dir /tmp/nodecue_addon_ci --force

      - name: Run unit tests
        run: python -m pytest tests -q

      - name: Build alpha release bundle
        run: python scripts/build_release_bundle.py --output dist/nodecue-alpha-bundle.zip

      - name: Verify alpha release bundle
        run: |
          python -m zipfile -l dist/nodecue-alpha-bundle.zip
          python -m zipfile -l dist/nodecue-alpha-bundle.zip | grep "NodeCue/nodecue/__init__.py"
          python -m zipfile -l dist/nodecue-alpha-bundle.zip | grep "NodeCue/nodecue_agent/__init__.py"
          python -m zipfile -l dist/nodecue-alpha-bundle.zip | grep "NodeCue/scripts/install_addon.py"
          python -m zipfile -l dist/nodecue-alpha-bundle.zip | grep "NodeCue/.env.example"
          ! python -m zipfile -l dist/nodecue-alpha-bundle.zip | grep -E "(__pycache__|\\.pyc$|\\.env$|\\.blend1?$|\\.tgz$)"

      - name: Upload alpha release bundle
        uses: actions/upload-artifact@v4
        with:
          name: nodecue-alpha-bundle
          path: dist/nodecue-alpha-bundle.zip
