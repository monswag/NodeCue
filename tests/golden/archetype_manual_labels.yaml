# Manual archetype labels — extracted from docs/archetype_candidates.md (v4).
#
# Keys: "{blend_name}/{group_name}" (group name uses underscore-for-space to
# match the exported JSON file convention).
# Values:
#   primary: the archetype that best captures the group's purpose
#   secondary: optional list of archetypes the group also exhibits
#   mechanics: expected mechanics (informational; detector runs them)
#   note: source of the label in archetype_candidates.md

